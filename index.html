<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Temp Mail</title>
    <!-- Loading Tailwind CSS for beautiful, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom scrollbar for the inbox */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800">

    <!-- Main Content Container -->
    <main class="flex-grow container mx-auto px-4 py-10 max-w-4xl">
        
        <!-- Header Section -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-blue-600 mb-4">Free Temp Mail</h1>
            <p class="text-gray-500 text-lg">Protect your privacy with a secure, disposable email address.</p>
        </div>

        <!-- Email Generation Card -->
        <div class="bg-white rounded-2xl shadow-lg p-6 md:p-10 mb-8 border border-gray-100">
            
            <div class="flex flex-col md:flex-row gap-3 mb-6 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                <input type="text" id="customUsername" class="flex-grow bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3" placeholder="Enter custom name (e.g. my-test-email)">
                <div class="flex items-center justify-center font-bold text-gray-400 px-2">@</div>
                <select id="domainSelect" class="bg-white border border-gray-300 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 min-w-[150px]">
                    <option value="1secmail.com">Loading...</option>
                </select>
                <button onclick="setCustomEmail()" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-6 py-3 transition-colors shadow-sm">
                    Use Custom
                </button>
            </div>
            
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-bold uppercase tracking-wider">OR GENERATE RANDOM</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 items-center justify-center mt-2">
                
                <!-- Display the generated email -->
                <div class="relative w-full md:w-2/3">
                    <input type="text" id="emailAddress" readonly 
                           class="w-full bg-gray-50 border border-gray-300 text-gray-700 text-lg rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-4 pr-24 font-mono text-center md:text-left transition-all" 
                           placeholder="Click generate to get an email...">
                    
                    <!-- Copy Button -->
                    <button id="copyBtn" onclick="copyEmail()" class="hidden absolute right-2 top-2 bottom-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg text-sm px-4 py-2 transition-colors">
                        Copy
                    </button>
                </div>

                <!-- Generate Button -->
                <button onclick="generateNewEmail()" id="generateBtn" class="w-full md:w-auto text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-xl text-lg px-8 py-4 transition-transform transform hover:scale-105 shadow-md">
                    Generate New
                </button>
            </div>
            
            <!-- Status indicator (Polling) -->
            <div id="statusIndicator" class="mt-4 text-center text-sm text-gray-500 hidden flex items-center justify-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Waiting for incoming emails... (Auto-refreshing)
            </div>
        </div>

        <!-- Inbox Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Message List (Left Side) -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden md:col-span-1 flex flex-col h-[500px]">
                <div class="bg-gray-50 border-b border-gray-200 p-4 font-bold text-gray-700 flex justify-between items-center">
                    <span>Inbox</span>
                    <span id="messageCount" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <ul id="messageList" class="overflow-y-auto custom-scrollbar flex-grow divide-y divide-gray-100">
                    <li class="p-8 text-center text-gray-400 flex flex-col items-center justify-center h-full">
                        <svg class="w-12 h-12 mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Your inbox is empty
                    </li>
                </ul>
            </div>

            <!-- Message Content Viewer (Right Side) -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden md:col-span-2 flex flex-col h-[500px]">
                <div class="bg-gray-50 border-b border-gray-200 p-4 font-bold text-gray-700">
                    Message Reader
                </div>
                <div id="messageViewer" class="p-6 overflow-y-auto custom-scrollbar flex-grow text-gray-600 flex items-center justify-center bg-gray-50/50">
                    Select an email from the inbox to read it here.
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t py-6 mt-auto">
        <div class="text-center text-gray-500 text-sm">
            Powered by Mail.tm API • Built for Free on GitHub Pages
        </div>
    </footer>

    <script>
        // Global State
        let currentEmail = "";
        let currentToken = ""; // Mail.tm uses secure JWT tokens instead of usernames
        let pollingInterval = null;
        let loadedMessages = new Set();
        let consecutiveErrors = 0;

        // DOM Elements
        const emailInput = document.getElementById('emailAddress');
        const copyBtn = document.getElementById('copyBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const messageList = document.getElementById('messageList');
        const messageCount = document.getElementById('messageCount');
        const messageViewer = document.getElementById('messageViewer');
        const generateBtn = document.getElementById('generateBtn');
        const customUsernameInput = document.getElementById('customUsername');
        const domainSelect = document.getElementById('domainSelect');

        const API_BASE = 'https://api.mail.tm';

        // 1. Fetch available domains natively (No proxy needed!)
        async function loadDomains() {
            try {
                const response = await fetch(`${API_BASE}/domains?page=1`);
                const data = await response.json();
                if (data['hydra:member']) {
                    const domains = data['hydra:member'].map(d => d.domain);
                    domainSelect.innerHTML = domains.map(d => `<option value="${d}">${d}</option>`).join('');
                }
            } catch (error) {
                console.error("Failed to load domains", error);
                domainSelect.innerHTML = '<option value="">Network Error</option>';
            }
        }
        
        loadDomains();

        // 2. Helper to Register and Login to Mail.tm
        async function registerAndLogin(address) {
            const password = Math.random().toString(36).slice(-10) + "A1!"; // Secure random password
            
            // Register Account
            const regRes = await fetch(`${API_BASE}/accounts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, password })
            });

            if (!regRes.ok) {
                if (regRes.status === 422) throw new Error("Username already taken!");
                throw new Error("Failed to create account");
            }

            // Login to get JWT Token
            const tokenRes = await fetch(`${API_BASE}/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ address, password })
            });

            if (!tokenRes.ok) throw new Error("Failed to authenticate");

            const tokenData = await tokenRes.json();
            currentToken = tokenData.token;
            currentEmail = address;
            consecutiveErrors = 0;
        }

        // 3. UI Reset Helper
        function resetUIForNewEmail() {
            emailInput.value = currentEmail;
            copyBtn.classList.remove('hidden');
            statusIndicator.classList.remove('hidden');
            statusIndicator.innerHTML = `
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Waiting for incoming emails... (Auto-refreshing)`;
            messageList.innerHTML = `<li class="p-6 text-center text-gray-400 text-sm">Waiting for new emails...</li>`;
            messageViewer.innerHTML = `<div class="text-center text-gray-400">Select an email to read</div>`;
            messageCount.innerText = "0";
            loadedMessages.clear();

            if (pollingInterval) clearInterval(pollingInterval);
            checkInbox(); // check immediately once
            pollingInterval = setInterval(checkInbox, 5000);
        }

        // 4. Generate Random Email
        async function generateNewEmail() {
            try {
                generateBtn.innerText = "Generating...";
                generateBtn.disabled = true;
                emailInput.value = "Creating secure inbox...";

                const domain = domainSelect.value;
                if (!domain) throw new Error("Domains not loaded yet");
                
                const randomName = Math.random().toString(36).slice(-8);
                await registerAndLogin(`${randomName}@${domain}`);
                
                resetUIForNewEmail();

            } catch (error) {
                console.error("Connection Error:", error);
                emailInput.value = "Connection Failed";
                messageViewer.innerHTML = `<div class="text-center text-red-500 p-6 font-bold">Error: ${error.message}</div>`;
            } finally {
                generateBtn.innerText = "Generate New";
                generateBtn.disabled = false;
            }
        }

        // 5. Custom Email Handler
        async function setCustomEmail() {
            const username = customUsernameInput.value.trim().toLowerCase().replace(/[^a-z0-9.]/g, '');
            if(!username) return;
            
            const domain = domainSelect.value;
            const address = `${username}@${domain}`;
            
            const customBtn = document.querySelector('button[onclick="setCustomEmail()"]');
            const originalText = customBtn.innerText;
            
            customBtn.innerText = "Checking...";
            customBtn.disabled = true;

            try {
                await registerAndLogin(address);
                resetUIForNewEmail();
                customUsernameInput.value = '';
                customBtn.innerText = originalText;
                customBtn.disabled = false;
            } catch (error) {
                // If name is taken, show a red warning on the button!
                customBtn.innerText = "Name Taken!";
                customBtn.classList.replace('bg-blue-600', 'bg-red-500');
                
                setTimeout(() => {
                    customBtn.innerText = originalText;
                    customBtn.classList.replace('bg-red-500', 'bg-blue-600');
                    customBtn.disabled = false;
                }, 3000);
            }
        }

        // 6. Check Inbox
        async function checkInbox() {
            if (!currentToken) return;

            try {
                const res = await fetch(`${API_BASE}/messages`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                
                if (!res.ok) throw new Error("Auth error");
                
                const data = await res.json();
                const messages = data['hydra:member'];
                consecutiveErrors = 0;

                messageCount.innerText = messages.length;

                if (messages.length > 0 && messages.length !== loadedMessages.size) {
                    messageList.innerHTML = ''; // clear waiting text
                    
                    messages.forEach(msg => {
                        loadedMessages.add(msg.id);
                        
                        const li = document.createElement('li');
                        li.className = "p-4 hover:bg-blue-50 cursor-pointer transition-colors border-l-4 border-transparent hover:border-blue-500";
                        li.onclick = () => readMessage(msg.id, li);
                        
                        const date = new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        const senderName = msg.from.name || msg.from.address;

                        li.innerHTML = `
                            <div class="flex justify-between items-baseline mb-1">
                                <h4 class="text-sm font-bold text-gray-900 truncate pr-2">${senderName}</h4>
                                <span class="text-xs text-gray-500 flex-shrink-0">${date}</span>
                            </div>
                            <p class="text-sm text-gray-600 truncate">${msg.subject || "(No Subject)"}</p>
                        `;
                        messageList.appendChild(li);
                    });
                }
            } catch (error) {
                consecutiveErrors++;
                if (consecutiveErrors >= 3) {
                    clearInterval(pollingInterval);
                    statusIndicator.innerHTML = '<span class="text-red-500 font-bold">Connection lost. Check internet.</span>';
                }
            }
        }

        // 7. Read Specific Message
        async function readMessage(messageId, listItemElement) {
            try {
                document.querySelectorAll('#messageList li').forEach(el => el.classList.remove('bg-blue-50', 'border-blue-500'));
                listItemElement.classList.add('bg-blue-50', 'border-blue-500');

                messageViewer.innerHTML = `<div class="text-center text-gray-500"><span class="animate-pulse">Loading secure message...</span></div>`;

                const res = await fetch(`${API_BASE}/messages/${messageId}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const msg = await res.json();

                let content = "No content available.";
                if (msg.html && msg.html.length > 0) {
                    content = msg.html[0]; // Mail.tm supplies HTML as an array
                } else if (msg.text) {
                    content = `<pre class="whitespace-pre-wrap font-sans">${msg.text}</pre>`;
                }

                const senderFull = msg.from.name ? `${msg.from.name} &lt;${msg.from.address}&gt;` : msg.from.address;

                messageViewer.innerHTML = `
                    <div class="w-full flex flex-col h-full bg-white text-left">
                        <div class="mb-6 pb-4 border-b">
                            <h2 class="text-xl font-bold text-gray-800 mb-2">${msg.subject || "(No Subject)"}</h2>
                            <div class="flex flex-col text-sm text-gray-600">
                                <span><strong>From:</strong> ${senderFull}</span>
                                <span><strong>Date:</strong> ${new Date(msg.createdAt).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="overflow-y-auto flex-grow text-gray-800 email-content">
                            ${content}
                        </div>
                    </div>
                `;
            } catch (error) {
                messageViewer.innerHTML = `<div class="text-red-500">Error decrypting message.</div>`;
            }
        }

        // 8. Copy Clipboard
        function copyEmail() {
            if (!currentEmail) return;
            navigator.clipboard.writeText(currentEmail).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                copyBtn.classList.add('bg-green-100', 'text-green-700');
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.classList.remove('bg-green-100', 'text-green-700');
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement("textarea");
                textArea.value = currentEmail;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = "Copy", 2000);
            });
        }
    </script>
</body>
</html>
